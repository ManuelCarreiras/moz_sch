# HTTP - development server (no SSL)
# Resolver + variable proxy_pass: resolve "api" at request time so nginx starts even if
# the API container is not up yet (e.g. `docker compose up frontend` only).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # API proxy - route /api requests to the API container
    location /api/ {
        set $api_upstream api:5000;
        proxy_pass http://$api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Frontend - serve React app
    location / {
        try_files $uri /index.html;
    }

    client_max_body_size 10M;
}
